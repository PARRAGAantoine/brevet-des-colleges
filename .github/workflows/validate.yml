name: Validate app content

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        working-directory: app-brevet
        run: |
          node --check app.js
          node --check data/notions.js
          node --check generators/registry.js
          node --check generators/math-calcul.js
          node --check generators/science-calcul.js
          node --check generators/french-language.js
          node --check tools/validate-content.js

      - name: Validate content and generators
        working-directory: app-brevet
        run: node tools/validate-content.js
